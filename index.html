<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pocket Universe — Cosmic Sandbox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050810; --card: #0a0e1a; --border: #1a2035; --muted: #111827;
      --mfg: #4b5563; --fg: #e2e8f0; --fgdim: #94a3b8; --cyan: #00e5ff;
      --gold: #ffc107; --pink: #e040fb; --purple: #7c3aed; --green: #22c55e; --red: #ef4444;
    }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--fg); font-family: 'Inter', sans-serif; }
    .starfield {
      background-image:
        radial-gradient(1.5px 1.5px at 8% 12%, rgba(255,255,255,.7), transparent),
        radial-gradient(1px 1px at 22% 67%, rgba(255,255,255,.4), transparent),
        radial-gradient(2px 2px at 53% 45%, rgba(255,255,255,.3), transparent),
        radial-gradient(1.5px 1.5px at 91% 14%, rgba(255,255,255,.7), transparent);
    }
    .glow-cyan { box-shadow: 0 0 14px 3px rgba(0,229,255,.4); }
    #app { display: flex; flex-direction: column; height: 100vh; }
    #desktop-layout { display: flex; flex: 1; min-height: 0; }
    #left-sidebar, #right-sidebar { width: 280px; flex-shrink: 0; display: flex; flex-direction: column; background: rgba(10,14,26,.85); backdrop-filter: blur(12px); border-color: var(--border); }
    #left-sidebar { border-right: 1px solid var(--border); }
    #right-sidebar { border-left: 1px solid var(--border); }
    #canvas-wrap { flex: 1; position: relative; overflow: hidden; }
    #orbital-canvas { width: 100%; height: 100%; display: block; background: #050810; }
    .sidebar-header { padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .sidebar-scroll { flex: 1; overflow-y: auto; padding: 12px; }
    .sidebar-footer { padding: 10px 16px; border-top: 1px solid var(--border); text-align: center; }
    .section-head { font-size: 10px; font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--cyan); letter-spacing: .1em; margin-bottom: 10px; }
    .planet-item { width: 100%; display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 6px; cursor: pointer; text-align: left; color: var(--fg); transition: background 0.2s; }
    .planet-item:hover { background: rgba(255,255,255,0.05); }
    .planet-item.active { background: rgba(0,229,255,0.1); border: 1px solid var(--cyan); }
    .planet-dot { width: 12px; height: 12px; border-radius: 50%; }
    .canvas-ctrl { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; }
    .c-btn { padding: 8px 12px; border-radius: 6px; background: rgba(10,14,26,.9); border: 1px solid var(--border); color: white; cursor: pointer; }
    .c-btn:hover { border-color: var(--cyan); }
    .c-label { padding: 8px 12px; background: rgba(10,14,26,.9); border: 1px solid var(--border); font-size: 11px; border-radius: 6px; }
    .stat-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 10px; border-radius: 6px; margin-bottom: 8px; }
    .stat-label { font-size: 9px; color: var(--mfg); text-transform: uppercase; }
    .stat-val { font-size: 13px; font-weight: 600; color: white; }
  </style>
</head>
<body class="starfield">
<div id="app">
  <div id="desktop-layout">
    <aside id="left-sidebar">
      <div class="sidebar-header">
        <h1 style="font-family:'Orbitron',sans-serif; font-size:16px; color:white; font-weight:700;">Pocket Universe</h1>
        <p style="font-size:9px; color:var(--cyan);">SYSTEM ACTIVE</p>
      </div>
      <div class="sidebar-scroll">
        <div class="section-head">CELESTIAL BODIES</div>
        <div id="planet-list"></div>
      </div>
      <div class="sidebar-footer"><p style="font-size:9px; color:var(--mfg)">SANDBOX EMULATOR</p></div>
    </aside>

    <main id="canvas-wrap">
      <canvas id="orbital-canvas"></canvas>
      <div class="canvas-ctrl">
        <button class="c-btn" onclick="togglePause()">Pause/Play</button>
        <button class="c-btn" onclick="adjustZoom(0.1)">+</button>
        <button class="c-btn" onclick="adjustZoom(-0.1)">-</button>
        <div class="c-label" id="zoom-label">100%</div>
      </div>
    </main>

    <aside id="right-sidebar">
      <div class="sidebar-header">
        <h2 style="font-family:'Orbitron',sans-serif; font-size:12px; color:white;">COSMIC CODEX</h2>
      </div>
      <div class="sidebar-scroll" id="codex-body">
        <div class="stat-card">
          <div class="stat-label">Selected Target</div>
          <div class="stat-val" id="codex-name">Sun</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Mass Parameter</div>
          <div class="stat-val" id="codex-mass">333,000 M⊕</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Orbital Velocity</div>
          <div class="stat-val" id="codex-vel">0.00 km/s</div>
        </div>
      </div>
    </aside>
  </div>
</div>

<script>
  // ─── INITIALIZATION & STATE ───
  const canvas = document.getElementById('orbital-canvas');
  const ctx = canvas.getContext('2d');
  
  let zoom = 1.0;
  let isPaused = false;
  let selectedPlanetIndex = 0;

  // Safe baseline solar system configuration
  const planets = [
    { name: "Sun", distance: 0, radius: 18, color: "#ffcc00", mass: "333,000 M⊕", velocity: "0.00", angle: 0, speed: 0 },
    { name: "Mercury", distance: 45, radius: 4, color: "#9e9e9e", mass: "0.055 M⊕", velocity: "47.4", angle: Math.random() * 360, speed: 0.03 },
    { name: "Venus", distance: 75, radius: 6, color: "#e3bb76", mass: "0.815 M⊕", velocity: "35.0", angle: Math.random() * 360, speed: 0.02 },
    { name: "Earth", distance: 110, radius: 7, color: "#4ba3e3", mass: "1.000 M⊕", velocity: "29.8", angle: Math.random() * 360, speed: 0.015 },
    { name: "Mars", distance: 150, radius: 5, color: "#e35b36", mass: "0.107 M⊕", velocity: "24.1", angle: Math.random() * 360, speed: 0.012 },
    { name: "Jupiter", distance: 210, radius: 12, color: "#cca37a", mass: "317.8 M⊕", velocity: "13.1", angle: Math.random() * 360, speed: 0.007 }
  ];

  // ─── RESIZING FIX ───
  function resizeCanvas() {
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * window.devicePixelRatio;
    canvas.height = rect.height * window.devicePixelRatio;
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  }

  // ─── SIMULATION PHYSICS LOOP ───
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    const centerX = canvas.width / (2 * window.devicePixelRatio);
    const centerY = canvas.height / (2 * window.devicePixelRatio);

    // Render orbits and planets
    planets.forEach((planet, index) => {
      if (planet.distance > 0) {
        // Draw orbital trail
        ctx.beginPath();
        ctx.arc(centerX, centerY, planet.distance * zoom, 0, Math.PI * 2);
        ctx.strokeStyle = index === selectedPlanetIndex ? "rgba(0, 229, 255, 0.25)" : "rgba(26, 32, 53, 0.4)";
        ctx.lineWidth = index === selectedPlanetIndex ? 1.5 : 1;
        ctx.stroke();

        // Update physics positions if not paused
        if (!isPaused) {
          planet.angle += planet.speed;
        }
      }

      // Calculate relative coordinate structures
      const rad = (planet.angle * Math.PI) / 180;
      const planetX = centerX + Math.cos(rad) * planet.distance * zoom;
      const planetY = centerY + Math.sin(rad) * planet.distance * zoom;

      // Draw Planet Glow Aura
      if (index === selectedPlanetIndex) {
        ctx.beginPath();
        ctx.arc(planetX, planetY, (planet.radius + 6) * zoom, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(0, 229, 255, 0.15)";
        ctx.fill();
      }

      // Draw Base Planet body
      ctx.beginPath();
      ctx.arc(planetX, planetY, planet.radius * zoom, 0, Math.PI * 2);
      ctx.fillStyle = planet.color;
      ctx.fill();
    });

    requestAnimationFrame(animate);
  }

  // ─── INTERACTION CONTROLS ───
  function buildSidebarList() {
    const container = document.getElementById('planet-list');
    container.innerHTML = "";
    planets.forEach((planet, i) => {
      const item = document.createElement('button');
      item.className = `planet-item ${i === selectedPlanetIndex ? 'active' : ''}`;
      item.onclick = () => selectPlanet(i);
      item.innerHTML = `
        <div class="planet-dot" style="background:${planet.color}"></div>
        <div class="planet-name">${planet.name}</div>
      `;
      container.appendChild(item);
    });
  }

  function selectPlanet(index) {
    selectedPlanetIndex = index;
    const target = planets[index];
    document.getElementById('codex-name').textContent = target.name;
    document.getElementById('codex-mass').textContent = target.mass;
    document.getElementById('codex-vel').textContent = target.name === "Sun" ? "0.00 km/s" : `${target.velocity} km/s`;
    buildSidebarList();
  }

  function togglePause() {
    isPaused = !isPaused;
  }

  function adjustZoom(amount) {
    zoom = Math.max(0.4, Math.min(2.5, zoom + amount));
    document.getElementById('zoom-label').textContent = Math.round(zoom * 100) + "%";
  }

  // ─── SYSTEM STARTUP ───
  window.addEventListener('resize', resizeCanvas);
  
  // Quick timeout yields processing time to guarantee layouts have set sizes before calculation
  setTimeout(() => {
    resizeCanvas();
    buildSidebarList();
    selectPlanet(0);
    animate();
  }, 100);
</script>
</body>
</html>
